name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required to request the OIDC token AWS verifies

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  BUCKET: zebesguessr.com
  DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
  ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: us-east-1

      # Hashed assets and baked tiles never change content under a given name,
      # so they cache forever. Uploaded before index.html so the new page can
      # never reference an asset that isn't there yet.
      - name: Upload immutable assets
        run: |
          aws s3 sync dist/ "s3://$BUCKET" --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" --exclude "data/*"

      # Game JSON is regenerated by the pipeline and must not go stale.
      - name: Upload game data
        run: |
          aws s3 sync dist/data/ "s3://$BUCKET/data/" --delete \
            --cache-control "public,max-age=60"

      - name: Upload index.html
        run: |
          aws s3 cp dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "no-cache"

      # no-cache on index.html means browsers revalidate, but CloudFront's edges
      # still hold a copy — invalidate so a deploy is visible immediately.
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/" "/index.html" "/data/*"
